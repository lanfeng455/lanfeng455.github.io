<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>云</title>
    
    <!-- 字体引入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Montserrat:wght@300;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="poem.css">
</head>
<body class="poem-page">
    <!-- 顶部导航：极简，半透明 -->
    <header class="poem-header">
        <div class="poem-header-inner">
            <a href="../index.html#writing" class="poem-back">
                <span class="poem-back-icon">◆</span> 返回文学馆
            </a>
            <span class="poem-badge">诗 · 小说</span>
        </div>
    </header>

    <main class="poem-main">
        <!-- 光晕背景装饰 -->
        <div class="poem-glow glow-1"></div>
        <div class="poem-glow glow-2"></div>
        <div class="poem-glow glow-3"></div>

         <!-- ===== 碎片背景 ===== -->
        <div class="poem-fragments">
            <span class="poem-fragment" style="top:8%; left:5%; font-size:3rem; animation-delay:0s;">茜色</span>
            <span class="poem-fragment" style="top:15%; right:8%; font-size:2rem; animation-delay:-3s;">鸭翅</span>
            <span class="poem-fragment" style="bottom:25%; left:3%; font-size:2.8rem; animation-delay:-6s;">单车</span>
            <span class="poem-fragment" style="bottom:35%; right:5%; font-size:2.2rem; animation-delay:-9s;">白羊</span>
            <span class="poem-fragment" style="top:45%; left:2%; font-size:1.8rem; animation-delay:-12s;">朝霞</span>
            <span class="poem-fragment" style="bottom:10%; right:12%; font-size:2.5rem; animation-delay:-15s;">雷雨</span>
        </div>

        <div class="poem-container typewriter">
            <!-- 作品信息 -->
            <div class="poem-head">
                <div class="poem-type-tag">[ 诗歌 / 短篇小说 ]</div>
                <h1 class="poem-title">《云》</h1>
                <div class="poem-meta">
                    <span>2026.06.20</span>
                    <span class="poem-meta-divider">·</span>
                    <span>祁庭（澜莓凤梨酥）</span>
                </div>
            </div>

            <!-- 分割装饰线 -->
            <div class="poem-divider">
                <span class="poem-divider-line"></span>
                <span class="poem-divider-diamond">◆</span>
                <span class="poem-divider-line"></span>
            </div>

            <!-- 正文 -->
            <div class="poem-body">

                <div class="poem-stanza">
                    <p>六月</p>
                    <p>云变得狂躁</p>
                    <p>屋檐</p>
                    <p>遮住世间所有的蓝色</p>
                    <p>包围我们的雷雨</p>
                </div>

                <div class="poem-stanza">
                    <p>每个世界都在沸腾</p>
                    <p>在上行的蒸汽里</p>
                    <p>你夹起晚饭的一只鸭翅，告诉我</p>
                    <p>要我许愿</p>
                    <p>等晨光穿过林荫之后</p>
                    <p>你要踏着橙黄的单车</p>
                    <p>追逐</p>
                    <p>半空的积云</p>
                    <p>直到它们消亡</p>
                    <p>或染上茜色的尾巴</p>
                </div>

                <div class="poem-stanza">
                    <p>别后的第九十天起</p>
                    <p>分汊出无数道没有朝霞的午后</p>
                    <p>而我总会横躺着</p>
                    <p>在床的右端</p>
                    <p>数着比我</p>
                    <p>更靠近你的白羊</p>
                </div>

                <div class="poem-stanza">
                    <p>此刻正往你的反方向奔去</p>
                </div>

                <!-- 结尾 -->
                <div class="poem-ending">
                    <p>—— 第二人生·其三 ——</p>
                </div>
            </div>

            <!-- 底部 -->
            <div class="poem-footer">
                <div class="poem-divider">
                    <span class="poem-divider-line"></span>
                    <span class="poem-divider-diamond">◇</span>
                    <span class="poem-divider-line"></span>
                </div>
                <a href="../index.html#writing" class="poem-back-bottom">← 回到文学馆</a>
            </div>
        </div>
    </main>
</body>
</html>
